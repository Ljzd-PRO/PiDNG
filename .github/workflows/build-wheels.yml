name: Build wheels

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheels:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-24.04
            archs: x86_64
          - name: Linux aarch64
            os: ubuntu-24.04-arm
            archs: aarch64
          - name: macOS x86_64
            os: macos-15-intel
            archs: x86_64
          - name: macOS arm64
            os: macos-15
            archs: arm64
          - name: Windows AMD64
            os: windows-2025
            archs: AMD64
          - name: Windows x86
            os: windows-2025
            archs: x86

    env:
      CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*
      CIBW_ARCHS: ${{ matrix.archs }}
      CIBW_TEST_COMMAND: python -c "import pidng; import pidng.ljpegCompress"

    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        with:
          output-dir: wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ runner.os }}-${{ matrix.archs }}
          path: wheelhouse/*.whl
          if-no-files-found: error
