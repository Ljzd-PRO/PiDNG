name: Build wheels

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    env:
      CIBW_BUILD: ${{ fromJSON('{"3.8":"cp38-*","3.9":"cp39-*","3.10":"cp310-*","3.11":"cp311-*","3.12":"cp312-*","3.13":"cp313-*","3.14":"cp314-*"}')[matrix.python-version] }}
      CIBW_ARCHS: ${{ fromJSON('{"ubuntu-latest":"x86_64 aarch64","macos-latest":"x86_64 arm64","windows-latest":"AMD64 x86"}')[matrix.os] }}
      CIBW_PRERELEASE_PYTHONS: "1"

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: wheelhouse/*.whl
